<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirrorBloom</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Kanit', sans-serif; overflow: hidden; }
        .bg { position: fixed; top:0; left:0; width:100%; height:100%; background: url('1781018670111.png') center/cover; z-index: -1; }
        #canvas { position: fixed; top:0; left:0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .ui { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .box { width: 100%; max-width: 400px; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 20px; color: #fff; text-align: center; }
        textarea, input { width: 90%; margin: 10px 0; padding: 10px; border-radius: 10px; }
        button { padding: 10px 20px; background: #E91E63; color: white; border: none; border-radius: 20px; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <canvas id="canvas"></canvas>
    
    <div class="ui">
        <div id="s1" class="box">
            <h3>ปลดปล่อยอารมณ์ด้านแย่</h3>
            <textarea id="t1" placeholder="พิมพ์สิ่งที่รู้สึกติดขัด..."></textarea>
            <button onclick="next(1)">เผาสลาย</button>
        </div>
        <div id="s2" class="box hidden">
            <h3>ตอนนี้ คุณ "ต้องการที่จะทำ" อะไร?</h3>
            <textarea id="t2" placeholder="พิมพ์ความปรารถนา..."></textarea>
            <button onclick="next(2)">ล็อกเป้าหมาย</button>
        </div>
        <div id="s3" class="box hidden">
            <h3>เหตุผลสนับสนุน <span style="color: #69F0AE;">"ความเป็นไปได้"</span></h3>
            <input class="f" placeholder="1. ฉันเคยผ่านเรื่องยากมาแล้ว">
            <input class="f" placeholder="2. ฉันเก่งขึ้นทุกวัน">
            <input class="f" placeholder="3. ทุกปัญหามีทางออก">
            <input class="f" placeholder="4. ฉันมีศักยภาพ">
            <input class="f" placeholder="5. จักรวาลสนับสนุนฉัน">
            <button onclick="next(3)">สร้างความเชื่อมั่น</button>
        </div>
        <div id="s4" class="box hidden">
            <h3>คุณคือผู้สร้างชีวิตใหม่</h3>
            <textarea id="t4" placeholder="ตั้งใจจะใช้เวลาต่อจากนี้อย่างไร?"></textarea>
            <button onclick="next(4)">ส่งเจตจำนง</button>
        </div>
        <div id="s5" class="box hidden">
            <h3>ขอบคุณ (3 อย่าง)</h3>
            <input class="g" placeholder="1. ขอบคุณ...">
            <input class="g" placeholder="2. ขอบคุณ...">
            <input class="g" placeholder="3. ขอบคุณ...">
            <button onclick="finish()">เสร็จสิ้นและผลิบาน</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let state = 'idle';

        function next(n) {
            if(n==1) { if(!document.getElementById('t1').value) return alert('โปรดระบายความรู้สึก'); }
            if(n==2) { if(!document.getElementById('t2').value) return alert('โปรดระบุสิ่งที่ต้องการ'); }
            document.getElementById('s'+n).classList.add('hidden');
            document.getElementById('s'+(n+1)).classList.remove('hidden');
            if(n==1) state = 'burning';
        }
        function finish() { state = 'celebrate'; document.getElementById('s5').classList.add('hidden'); alert('ยินดีด้วย! คุณได้ยกระดับพลังงานสำเร็จแล้ว'); location.reload(); }
        
        function draw() {
            ctx.clearRect(0,0,window.innerWidth, window.innerHeight);
            if(state == 'burning') {
                ctx.fillStyle = 'rgba(255,100,0,0.5)';
                ctx.beginPath(); ctx.arc(window.innerWidth/2, window.innerHeight/2, 100, 0, Math.PI*2); ctx.fill();
            }
            if(state == 'celebrate') {
                ctx.fillStyle = 'gold';
                ctx.beginPath(); ctx.arc(Math.random()*window.innerWidth, Math.random()*window.innerHeight, 5, 0, Math.PI*2); ctx.fill();
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
