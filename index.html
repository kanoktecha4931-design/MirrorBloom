<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirrorBloom - ปลดปล่อยและงอกงาม</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Kanit', sans-serif; overflow: hidden; background-color: #f0f0f0; }

        /* พื้นหลัง: แสดงภาพทิวทัศน์ที่คุณอัปโหลดไว้ */
        .landscape-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('20260609_103427_0000.png') center/cover no-repeat;
            z-index: 0;
            transition: filter 2s ease;
        }

        /* Canvas สำหรับเอฟเฟกต์ไฟ */
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }

        /* เลเยอร์ UI */
        .ui-layer { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* กล่อง UI */
        .container {
            width: 90%; max-width: 400px; text-align: center;
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: all 1s ease;
        }

        textarea { width: 100%; height: 120px; border-radius: 20px; border: 1px solid #ccc; padding: 15px; margin: 15px 0; box-sizing: border-box; }
        .btn { padding: 12px 30px; border-radius: 25px; border: none; cursor: pointer; color: white; font-weight: bold; font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body>

    <div class="landscape-bg" id="landscape"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="ui-layer">
        <div class="container" id="ui-box">
            <div id="release-screen">
                <h3>ปลดปล่อยความรู้สึก</h3>
                <textarea id="anger-text" placeholder="พิมพ์สิ่งที่รบกวนจิตใจคุณ..."></textarea>
                <button class="btn" style="background:#FF7F50;" onclick="startBurnAnimation()">เผาทำลายและปล่อยวาง</button>
            </div>

            <div id="bloom-screen" style="display:none; color:#FFF;">
                <h3>ผลิบานครั้งใหม่</h3>
                <textarea id="gratitude-input" placeholder="สิ่งที่คุณขอบคุณคือ..."></textarea>
                <button class="btn" style="background:#4CAF50;" onclick="saveLeaf()">บันทึกการเติบโต</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        let animationState = 'idle';

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = width / 2 + (Math.random() * 50 - 25);
                this.y = height / 2 + (Math.random() * 50 - 25);
                this.size = Math.random() * 5 + 3;
                this.life = 1;
                this.vx = Math.random() * 2 - 1;
                this.vy = Math.random() * -5 - 1;
                this.color = `rgba(255, ${Math.random() * 150 + 100}, 0, 1)`;
                this.decay = Math.random() * 0.02 + 0.02;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.life -= this.decay;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(/1\)$/, `${this.life})`);
                ctx.shadowBlur = 15;
                ctx.shadowColor = "orange"; // เพิ่มแสงสีส้ม
                ctx.fill();
                ctx.shadowBlur = 0; // reset
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            if (animationState === 'burning') {
                for (let i = 0; i < 10; i++) particles.push(new Particle());
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update(); p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }
        animate();

        function startBurnAnimation() {
            const textArea = document.getElementById('anger-text');
            if (textArea.value.trim() === '') return;
            textArea.style.opacity = '0';
            animationState = 'burning';
            setTimeout(() => {
                document.getElementById('release-screen').style.display = 'none';
                animationState = 'idle'; 
                startBloomTransition();
            }, 3000);
        }

        function startBloomTransition() {
            document.getElementById('bloom-screen').style.display = 'block';
        }

        function saveLeaf() {
            if(document.getElementById('gratitude-input').value.trim() === '') return;
            alert('บันทึกการเติบโตเรียบร้อย');
            document.getElementById('gratitude-input').value = '';
            document.getElementById('bloom-screen').style.display = 'none';
            document.getElementById('release-screen').style.display = 'block';
            document.getElementById('anger-text').value = '';
            document.getElementById('anger-text').style.opacity = '1';
        }
    </script>
</body>
</html>
