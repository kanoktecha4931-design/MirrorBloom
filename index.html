<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirrorBloom - Mirror of Wisdom</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Kanit', sans-serif; overflow: hidden; }

        /* พื้นหลัง: แสดงภาพทิวทัศน์ที่คุณอัปโหลดไว้ */
        .landscape-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('20260609_103427_0000.png') center/cover no-repeat;
            z-index: 0;
        }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.2); z-index: 1; }

        .ui-layer { position: relative; z-index: 10; height: 100%; display: flex; justify-content: center; align-items: center; }

        .container {
            width: 85%; max-width: 400px; text-align: center;
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 40px; border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); color: white;
        }

        textarea { width: 100%; height: 120px; border-radius: 20px; border: none; padding: 15px; margin: 15px 0; box-sizing: border-box; }
        .btn { padding: 12px 30px; border-radius: 25px; border: none; cursor: pointer; background: #2E7D32; color: white; font-weight: bold; }
        
        /* พื้นที่รับใบไม้ที่ผลิบาน */
        #tree-crown { position: absolute; top: 10%; right: 5%; width: 200px; height: 200px; z-index: 5; }
        .anime-leaf-grown { position: absolute; width: 30px; height: 30px; background: #4CAF50; border-radius: 0 70% 0 70%; border: 2px solid white; z-index: 6; }
    </style>
</head>
<body>

    <div class="landscape-bg"></div>
    <div class="overlay"></div>
    <div id="tree-crown"></div>

    <div class="ui-layer">
        <div class="container">
            <div id="release-screen">
                <h3>ปลดปล่อยความโกรธ</h3>
                <textarea id="anger" placeholder="พิมพ์สิ่งที่รบกวนจิตใจคุณ..."></textarea>
                <button class="btn" onclick="startBloom()">เผาทำลายความทุกข์</button>
            </div>

            <div id="bloom-screen" style="display:none;">
                <h3>งอกงามด้วยปัญญา</h3>
                <textarea id="gratitude" placeholder="สิ่งที่คุณขอบคุณคือ..."></textarea>
                <button class="btn" onclick="saveLeaf()">บันทึกการเติบโต</button>
            </div>
        </div>
    </div>

    <script>
        function startBloom() {
            if(document.getElementById('anger').value.trim() == '') return;
            document.getElementById('release-screen').style.display = 'none';
            document.getElementById('bloom-screen').style.display = 'block';
        }

        function saveLeaf() {
            const input = document.getElementById('gratitude');
            if(input.value.trim() == '') return;
            
            const crown = document.getElementById('tree-crown');
            const leaf = document.createElement('div');
            leaf.className = 'anime-leaf-grown';
            leaf.style.left = Math.random() * 150 + 'px';
            leaf.style.top = Math.random() * 150 + 'px';
            leaf.title = input.value;
            crown.appendChild(leaf);
            
            alert('ใบไม้ผลิบานแล้ว!');
            input.value = '';
            document.getElementById('bloom-screen').style.display = 'none';
            document.getElementById('release-screen').style.display = 'block';
        }
    </script>
</body>
</html>
