<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirrorBloom - ปรับคลื่นความถี่ (Stage 1 & 2)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Kanit', sans-serif; overflow: hidden;
            background-color: #000;
        }

        .landscape-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('20260609_103427_0000.png') center/cover no-repeat;
            z-index: 0; transition: filter 3s ease; /* เพิ่มเวลา transition ให้เนียนขึ้น */
        }

        #effects-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 2; pointer-events: none;
        }

        .ui-layer {
            position: relative; z-index: 10; height: 100%; display: flex;
            justify-content: center; align-items: center; pointer-events: none;
        }

        .container {
            width: 85%; max-width: 450px; text-align: center;
            background: transparent; padding: 10px;
            pointer-events: auto; transition: all 1s ease;
        }

        .hidden { display: none !important; opacity: 0; pointer-events: none; }
        
        /* Animation สำหรับ Fade In/Out สลับหน้าจอ */
        .fade-in { animation: fadeIn 1.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- STAGE 1: ใบไม้สีน้ำตาล (Releasing Resistance) --- */
        .brown-leaf {
            width: 100%; height: 150px;
            background: linear-gradient(135deg, #8B4513, #5C3A21);
            border: 3px solid #D2B48C; border-radius: 10px 50px 10px 50px;
            padding: 20px; font-size: 16px; color: #fff; line-height: 1.5;
            resize: none; outline: none; box-sizing: border-box;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5); font-family: 'Kanit', sans-serif;
            transition: all 1s ease;
        }
        .brown-leaf::placeholder { color: rgba(255,255,255,0.6); font-weight: 300; }

        /* --- STAGE 2: ใบไม้สีเหลืองอำพัน (The Pivot) เปลี่ยนผ่านสู่เช้าวันใหม่ --- */
        .yellow-leaf {
            width: 100%; height: 130px;
            background: linear-gradient(135deg, #FFCA28, #FF8F00);
            border: 3px solid #FFF3E0; border-radius: 50px 10px 50px 10px;
            padding: 20px; font-size: 16px; color: #4E342E; line-height: 1.5;
            resize: none; outline: none; box-sizing: border-box;
            box-shadow: 0 8px 25px rgba(255,143,0,0.4); font-family: 'Kanit', sans-serif;
        }
        .yellow-leaf::placeholder { color: rgba(78,52,46,0.5); font-weight: 400; }

        /* --- ข้อความทำสมาธิ (Meditation Overlay) --- */
        .breathe-text {
            color: #fff; font-size: 22px; font-weight: 300; line-height: 1.8;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9), 0 0 20px #ff7f50;
            animation: breathePulse 4s infinite ease-in-out;
        }
        @keyframes breathePulse {
            0% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.4; transform: scale(0.98); }
        }

        /* --- ปุ่มกด --- */
        .btn {
            margin-top: 25px; padding: 14px 35px; font-size: 16px; font-weight: 600;
            border-radius: 30px; cursor: pointer; border: 2px solid #fff; color: white;
            transition: all 0.2s ease; font-family: 'Kanit', sans-serif; letter-spacing: 0.5px;
        }
        .btn-burn { background: #ff7f50; box-shadow: 0 6px 0 #d25324, 0 10px 15px rgba(0,0,0,0.4); }
        .btn-burn:active { transform: translateY(6px); box-shadow: 0 0px 0 #d25324; }
        
        .btn-pivot { background: #FF8F00; box-shadow: 0 6px 0 #E65100, 0 10px 15px rgba(0,0,0,0.4); }
        .btn-pivot:active { transform: translateY(6px); box-shadow: 0 0px 0 #E65100; }

        h3 { color: #fff; text-shadow: 0 3px 6px rgba(0,0,0,0.6); margin-top: 0; font-size: 24px; font-weight: 500; }
        .announce-text { color: #fff; font-size: 17px; font-weight: 400; line-height: 1.6; text-shadow: 0 2px 8px rgba(0,0,0,0.8); margin-bottom: 15px; }
        .highlight { color: #FFCA28; font-weight: 600; font-size: 20px; }
    </style>
</head>
<body>

    <div class="landscape-bg" id="bg-image"></div>
    <canvas id="effects-canvas"></canvas>

    <div class="ui-layer">
        <div class="container" id="ui-box">
            
            <!-- STAGE 1: Releasing Resistance -->
            <div id="screen-release" class="fade-in">
                <h3>1. ปลดปล่อยความต้านทาน</h3>
                <textarea id="text-anger" class="brown-leaf" placeholder="ยอมรับและปลดปล่อย... พิมพ์สิ่งที่คุณรู้สึกติดขัด กังวล หรือสิ่งที่คุณไม่ต้องการในตอนนี้ เพื่อคลายพลังงานด้านลบออกไป"></textarea>
                <button class="btn btn-burn" onclick="burnProcess()">เผาสลายและส่งต่อให้จักรวาล</button>
            </div>

            <!-- MEDITATION OVERLAY (ระหว่างไฟไหม้) -->
            <div id="screen-breathe" class="hidden">
                <p class="breathe-text">
                    สูดหายใจเข้าลึกๆ...<br>
                    สิ่งที่คุณควบคุมไม่ได้<br>
                    จักรวาลได้รับไปจัดการแล้ว
                </p>
            </div>

            <!-- STAGE 2: The Pivot -->
            <div id="screen-pivot" class="hidden">
                <h3>2. หมุนทิศทางความคิด (Pivot)</h3>
                <p class="announce-text">
                    ในเมื่อสิ่งเมื่อสักครู่ คือสิ่งที่คุณ <span style="color:#ff7f50;">"ไม่ต้องการ"</span><br>
                    แล้วตอนนี้... คุณ <span class="highlight">"ต้องการ"</span> อะไรแทน?
                </p>
                <textarea id="text-pivot" class="yellow-leaf" placeholder="พิมพ์สิ่งที่คุณปรารถนาจะให้เกิดขึ้นแทนที่... (เช่น ฉันอยากรู้สึกสงบ, ฉันต้องการทางออกที่ง่ายดาย)"></textarea>
                <button class="btn btn-pivot" onclick="proceedToStage3()">ล็อกเป้าหมายใหม่</button>
            </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('effects-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let butterflies = [];
        let animationState = 'idle';

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- ผีเสื้อ (แสดงผลตลอดเวลาเพื่อความผ่อนคลาย) ---
        class Butterfly {
            constructor() {
                this.x = Math.random() * width;
                this.y = height * 0.5 + Math.random() * (height * 0.4);
                this.size = Math.random() * 5 + 4;
                this.speedX = Math.random() * 1.5 - 0.75;
                this.speedY = Math.random() * 1 - 0.5;
                this.wingWing = 0;
                this.wingSpeed = Math.random() * 0.2 + 0.15;
                this.color = Math.random() > 0.5 ? '#e1bee7' : '#b2ebf2';
            }
            update() {
                this.x += this.speedX + Math.sin(this.wingWing) * 0.5;
                this.y += this.speedY;
                this.wingWing += this.wingSpeed;
                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < height * 0.5 || this.y > height * 0.95) this.speedY *= -1;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = this.color;
                let wingWidth = this.size * Math.abs(Math.sin(this.wingWing));
                ctx.beginPath();
                ctx.ellipse(-wingWidth/2, -this.size/2, wingWidth, this.size, 0.5, 0, Math.PI * 2);
                ctx.ellipse(wingWidth/2, -this.size/2, wingWidth, this.size, -0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(0, 0, 1.5, this.size * 0.8, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        for (let i = 0; i < 6; i++) butterflies.push(new Butterfly());

        // --- ไฟเผาไหม้สมจริง ---
        class FireParticle {
            constructor() {
                this.x = width / 2 + (Math.random() * 120 - 60);
                this.y = height / 2 + (Math.random() * 50 - 25);
                this.size = Math.random() * 20 + 5;
                this.speedY = Math.random() * -8 - 2;
                this.speedX = Math.random() * 3 - 1.5;
                this.life = 1.0;
                this.decay = Math.random() * 0.015 + 0.01;
                let greenHue = Math.floor(Math.random() * 120 + 80); 
                this.color = `rgba(255, ${greenHue}, 0, `;
            }
            update() { 
                this.y += this.speedY; this.x += this.speedX; this.life -= this.decay; 
                if (this.size > 0.5) this.size -= 0.15; 
            }
            draw() {
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + this.life + ')';
                ctx.shadowBlur = 25; ctx.shadowColor = 'rgba(255, 80, 0, 1)'; 
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        function animationLoop() {
            ctx.clearRect(0, 0, width, height);

            butterflies.forEach(bf => { bf.update(); bf.draw(); });

            if (animationState === 'burning') {
                let gradient = ctx.createRadialGradient(width/2, height/2, 10, width/2, height/2, 300);
                gradient.addColorStop(0, 'rgba(255, 80, 0, 0.3)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);

                for (let i = 0; i < 18; i++) particles.push(new FireParticle());
            }

            ctx.globalCompositeOperation = 'lighter';
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            ctx.globalCompositeOperation = 'source-over'; 

            requestAnimationFrame(animationLoop);
        }
        animationLoop();

        // --- ระบบสลับหน้าจอ (Stage 1 -> Meditation -> Stage 2) ---
        function burnProcess() {
            const angerText = document.getElementById('text-anger');
            if (angerText.value.trim() === '') return;

            // หดข้อความและซ่อนหน้าจอ Release
            angerText.style.transform = 'scale(0.3) rotate(10deg)';
            angerText.style.opacity = '0';
            document.getElementById('screen-release').classList.add('hidden');
            
            // ทำให้ฉากหลังมืดลง และเปิดไฟ + ข้อความทำสมาธิ
            document.getElementById('bg-image').style.filter = 'brightness(0.2) saturate(0.5)';
            animationState = 'burning';
            
            const breatheScreen = document.getElementById('screen-breathe');
            breatheScreen.classList.remove('hidden');
            breatheScreen.classList.add('fade-in');

            // หน่วงเวลาให้ไฟไหม้และทำสมาธิประมาณ 5 วินาที
            setTimeout(() => {
                animationState = 'idle'; // ปิดไฟ
                breatheScreen.classList.add('hidden'); // ซ่อนข้อความทำสมาธิ
                
                // เข้าสู่ Stage 2: Pivot (เปลี่ยนฉากหลังให้สว่างขึ้นนิดหน่อย เหมือนรุ่งสาง)
                document.getElementById('bg-image').style.filter = 'brightness(0.7) saturate(0.8)';
                
                const pivotScreen = document.getElementById('screen-pivot');
                pivotScreen.classList.remove('hidden');
                pivotScreen.classList.add('fade-in');
            }, 5500);
        }

        // ฟังก์ชันเชื่อมต่อไปยัง Stage 3 (เตรียมไว้สำหรับอนาคต)
        function proceedToStage3() {
            const pivotText = document.getElementById('text-pivot');
            if (pivotText.value.trim() === '') return;
            
            alert("พร้อมเข้าสู่ Stage 3: The Bridge (สร้างสะพานความเชื่อ)");
            // โค้ดส่วนนี้จะถูกพัฒนาต่อในรอบถัดไป
        }
    </script>
</body>
</html>
